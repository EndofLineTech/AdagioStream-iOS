name: MobileMusic
options:
  bundleIdPrefix: com.mobilemusic
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

packages:
  VLCKitSPM:
    url: https://github.com/tylerjonesio/vlckit-spm
    from: "3.5.1"

targets:
  MobileMusic:
    type: application
    platform: iOS
    sources:
      - MobileMusic
    dependencies:
      - package: VLCKitSPM
    info:
      path: MobileMusic/Info.plist
      properties:
        UIBackgroundModes: [audio]
        CFBundleDisplayName: MobileMusic
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlaySceneDelegate
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: MobileMusic/MobileMusic.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.mobilemusic.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
    entitlements:
      path: MobileMusic/MobileMusic.entitlements
      properties:
        com.apple.developer.carplay-audio: true
