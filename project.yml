name: AdagioStream
options:
  bundleIdPrefix: com.adagiostream
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

packages:
  MPVKit:
    url: https://github.com/mpvkit/MPVKit.git
    from: "0.41.0"

targets:
  AdagioStream:
    type: application
    platform: iOS
    sources:
      - AdagioStream
    dependencies:
      - package: MPVKit
        product: MPVKit
      - target: AdagioStreamWidget
    info:
      path: AdagioStream/Info.plist
      properties:
        UIBackgroundModes: [audio]
        CFBundleDisplayName: Adagio Stream
        NSSupportsLiveActivities: true
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: ""
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlaySceneDelegate
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: AdagioStream/AdagioStream.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.adagiostream.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIRequiresFullScreen: true
    entitlements:
      path: AdagioStream/AdagioStream.entitlements
      properties:
        com.apple.developer.carplay-audio: true

  AdagioStreamWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: AdagioStreamWidget
      - path: AdagioStream/Models/NowPlayingAttributes.swift
    info:
      path: AdagioStreamWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adagiostream.app.widget
        GENERATE_INFOPLIST_FILE: true
        IPHONEOS_DEPLOYMENT_TARGET: "16.1"
        INFOPLIST_KEY_CFBundleDisplayName: Adagio Stream Widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: true
