name: AdagioStream
options:
  bundleIdPrefix: com.adagiostream
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEAD_CODE_STRIPPING: true
    ENABLE_USER_SCRIPT_SANDBOXING: true
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES_ERROR
    CLANG_WARN_BOOL_CONVERSION: YES_ERROR
    CLANG_WARN_COMMA: YES_ERROR
    CLANG_WARN_CONSTANT_CONVERSION: YES_ERROR
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
    CLANG_WARN_EMPTY_BODY: YES
    CLANG_WARN_ENUM_CONVERSION: YES_ERROR
    CLANG_WARN_INFINITE_RECURSION: YES
    CLANG_WARN_INT_CONVERSION: YES_ERROR
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES_ERROR
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES_ERROR
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_WARN_UNREACHABLE_CODE: YES_ERROR
    ENABLE_STRICT_OBJC_MSGSEND: YES
    GCC_NO_COMMON_BLOCKS: YES
    GCC_WARN_64_TO_32_BIT_CONVERSION: YES_ERROR
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: YES
    GCC_WARN_UNUSED_VARIABLE: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

packages:
  VLCKitSPM:
    url: https://github.com/tylerjonesio/vlckit-spm
    exactVersion: "3.6.0"

targets:
  AdagioStream:
    type: application
    platform: iOS
    sources:
      - AdagioStream
    dependencies:
      - package: VLCKitSPM
    info:
      path: AdagioStream/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes: [audio]
        CFBundleDisplayName: Adagio Stream
        NSSupportsLiveActivities: false
        UILaunchStoryboardName: LaunchScreen
        LSApplicationQueriesSchemes:
          - spotify
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsForMedia: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlaySceneDelegate
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: AdagioStream/AdagioStream.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.adagiostream.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "75"
        DEVELOPMENT_TEAM: EWT2X7Q9ZJ
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIRequiresFullScreen: true
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    entitlements:
      path: AdagioStream/AdagioStream.entitlements
      properties:
        com.apple.developer.carplay-audio: true

  AdagioStreamTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AdagioStreamTests
    dependencies:
      - target: AdagioStream
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true

schemes:
  AdagioStream:
    build:
      targets:
        AdagioStream: all
        AdagioStreamTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AdagioStreamTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
